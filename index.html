<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="container">
      <form class="add-task-form">
        <h2>Add task:</h2>
        <a class="svg-btn" href="history.html">
          <img src="./img/open-book.svg" alt="History">
        </a>
        <input class="add-task-input" name="add-task-input"/>
        <button type="submit" class="tasks-btn submit-btn-add">Add task</button>
        <button type="submit" class="tasks-btn submit-btn-clear">Clear All</button>
      </form>
      <div class="tasks-list-div">
        <h2>Tasks:</h2>
        <ul class="tasks-list" data-type="tasks">
        </ul>
      </div>
    </div>
    <script type="module" src="./js/script.js"></script>
  </body>
</html>
